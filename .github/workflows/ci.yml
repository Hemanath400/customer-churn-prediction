name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 🔍 DEBUG - Show everything before install
      run: |
        echo "=== Python ==="
        python --version
        echo "=== Pip ==="
        pip --version
        echo "=== Current packages ==="
        pip list || echo "No packages"

    - name: 💥 NUKE all packages and start fresh
      run: |
        pip freeze | xargs pip uninstall -y || true
        pip uninstall -y numpy || true
        pip uninstall -y scikit-learn || true
        echo "=== After uninstall ==="
        pip list || echo "Empty environment"

    - name: 📦 Install specific versions
      run: |
        pip install numpy==1.24.3
        pip install scikit-learn==1.3.2
        pip install pandas==2.1.3
        pip install joblib==1.3.2
        pip install fastapi==0.104.1
        pip install uvicorn==0.24.0
        pip install pydantic==2.5.0
        pip install pytest==7.4.3 pytest-cov==4.1.0 httpx==0.25.1 flake8==6.1.0

    - name: ✅ Verify versions
      run: |
        echo "=== CRITICAL: NumPy version ==="
        python -c "import numpy; print(f'✅ NumPy: {numpy.__version__}')"
        python -c "import numpy; print(f'📍 NumPy location: {numpy.__file__}')"
        python -c "import numpy; print(f'🔍 NumPy has _core: {hasattr(numpy, \"_core\")}')"
        echo "=== Other versions ==="
        python -c "import sklearn; print(f'✅ sklearn: {sklearn.__version__}')"
        python -c "import pandas; print(f'✅ pandas: {pandas.__version__}')"
        python -c "import joblib; print(f'✅ joblib: {joblib.__version__}')"

    - name: 🔬 Debug - Test loading the scaler directly
      run: |
        python -c "
import joblib
import sys
print('Attempting to load scaler...')
try:
    scaler = joblib.load('models/scaler.pkl')
    print('✅ Scaler loaded successfully!')
    print(f'Type: {type(scaler)}')
except Exception as e:
    print(f'❌ Failed to load scaler: {e}')
    import traceback
    traceback.print_exc()
    sys.exit(1)
"

    - name: 📁 Debug - Show file structure
      run: |
        echo "=== Current Directory: $(pwd) ==="
        ls -la
        echo "=== Models folder ==="
        ls -la models/ || echo "No models folder"
        echo "=== Models folder content ==="
        ls -la models/ | head -10

    - name: 🧪 Run tests
      run: |
        pytest tests/ -v -s